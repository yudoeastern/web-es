# Redirect all HTTP traffic from IP to domain
server {
    listen 80;
    listen [::]:80;
    server_name 8.215.103.151 _;

    # Redirect all requests to the main domain
    return 301 https://www.easternstack.com$request_uri;
}

# Main server block for easternstack.com
server {
    server_name easternstack.com www.easternstack.com;

    # Redirect HTTP to HTTPS (will be enabled after SSL setup)
    # For now, proxy to Next.js app
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/easternstack.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/easternstack.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot


}

server {
    if ($host = www.easternstack.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = easternstack.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    listen [::]:80;
    server_name easternstack.com www.easternstack.com;
    return 404; # managed by Certbot




}