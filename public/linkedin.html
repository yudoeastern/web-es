<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- LinkedIn Open Graph Meta Tags -->
    <meta property="og:title" content="EasternStack - Enterprise AI">
    <meta property="og:description" content="Enterprise AI with Greater Model Choice and Operational Control">
    <meta property="og:url" content="https://easternstack.com">
    <meta property="og:site_name" content="EasternStack">
    <meta property="og:locale" content="en_US">
    <meta property="og:type" content="website">
    
    <!-- LinkedIn OG Image - MUST be absolute URL -->
    <meta property="og:image" content="https://easternstack.com/og-image.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="1200">
    <meta property="og:image:type" content="image/png">
    <meta property="og:image:alt" content="EasternStack Logo">
    
    <!-- Fallback for LinkedIn -->
    <meta name="image" property="og:image" content="https://easternstack.com/og-image.png">
    <meta name="og:image:secure_url" content="https://easternstack.com/og-image.png">
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="EasternStack - Enterprise AI">
    <meta name="twitter:description" content="Enterprise AI with Greater Model Choice and Operational Control">
    <meta name="twitter:image" content="https://easternstack.com/og-image.png">
    <meta name="twitter:image:alt" content="EasternStack Logo">
    
    <!-- Redirect to main app -->
    <meta http-equiv="refresh" content="0;url=/">
    
    <title>EasternStack - Enterprise AI</title>
</head>
<body>
    <p>Redirecting to EasternStack...</p>
    <script>
        window.location.href = '/';
    </script>
</body>
</html>
