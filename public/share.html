<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EasternStack - Enterprise AI</title>
    
    <!-- Primary Open Graph / LinkedIn Meta Tags -->
    <meta property="og:title" content="EasternStack - Enterprise AI">
    <meta property="og:description" content="Enterprise AI with Greater Model Choice and Operational Control">
    <meta property="og:url" content="https://easternstack.com">
    <meta property="og:site_name" content="EasternStack">
    <meta property="og:locale" content="en_US">
    <meta property="og:type" content="website">
    
    <!-- OG Image for LinkedIn - MUST be absolute URL -->
    <meta property="og:image" content="https://easternstack.com/logo_head.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="1200">
    <meta property="og:image:type" content="image/png">
    <meta property="og:image:alt" content="EasternStack Logo">
    
    <!-- Fallback meta tags for LinkedIn scraper -->
    <meta name="image" property="og:image" content="https://easternstack.com/logo_head.png">
    <meta name="og:image:secure_url" content="https://easternstack.com/logo_head.png">
    <link rel="image_src" href="https://easternstack.com/logo_head.png">
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="EasternStack - Enterprise AI">
    <meta name="twitter:description" content="Enterprise AI with Greater Model Choice and Operational Control">
    <meta name="twitter:image" content="https://easternstack.com/logo_head.png">
    <meta name="twitter:image:alt" content="EasternStack Logo">
    
    <!-- Canonical URL -->
    <link rel="canonical" href="https://easternstack.com">
    
    <!-- Immediate redirect to main app -->
    <meta http-equiv="refresh" content="0;url=/">
    <script>window.location.href="/";</script>
</head>
<body>
    <div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:system-ui,sans-serif;">
        <div style="text-align:center;">
            <h1>EasternStack</h1>
            <p>Redirecting...</p>
        </div>
    </div>
</body>
</html>
